name: Android CI/CD Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_verify:
    runs-on: ubuntu-latest # 깃허브가 제공하는 최신 리눅스 서버

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 빌드 속도 최적화 [cite: 2026-01-12]

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # [1단계] 유닛 테스트 (로직 검증)
      - name: Run Unit Tests
        run: ./gradlew test

      # [2단계] UI 테스트 (에뮬레이터 검증) [cite: 2026-04-02]
      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: ./gradlew connectedAndroidTest