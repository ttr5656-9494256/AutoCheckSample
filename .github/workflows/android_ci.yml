name: Android Production CI/CD (Firebase & Release)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: '배포할 버전 (예: v1.0.6)'
        required: true
        default: 'v1.0.6'
      custom_message:
        description: '부장님께 드릴 메시지'
        required: true
        default: '시스템 안정화 및 15개 핵심 테스트 검증 완료 건 보고드립니다.'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # [실행] JUnit 테스트 및 린트 실행
      - name: Run Quality Check
        run: ./gradlew lintDebug testDebugUnitTest

      # --------------------------------------------------------------------------------
      # [주석] 미래 고도화: Firebase Test Lab 가이드
      # --------------------------------------------------------------------------------
      # - name: Run Firebase Test Lab
      #   run: |
      #     gcloud firebase test android run --app debug.apk --test androidTest.apk
      # --------------------------------------------------------------------------------

      # [핵심] 실제 결과 XML을 읽어서 15개 항목 엑셀 리포트 생성
      - name: Generate Quality Excel Report
        if: always()
        run: |
          pip install pandas xlsxwriter
          python generate_report.py

      - name: Upload Report to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-check-reports
          path: AutoCheck_Quality_Report.xlsx

  deploy:
    needs: build_and_test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Excel Report
        uses: actions/download-artifact@v4
        with:
          name: auto-check-reports

      - name: Build and Release
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          files: app/build/outputs/apk/release/*.apk

      - name: Send Notification Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[검증통과] AutoCheck v2.0.x 품질 보고 (${{ github.event.inputs.version_tag }})"
          to: "ttr5656@uangel.com"
          from: GitHub Actions CI/CD
          attachments: AutoCheck_Quality_Report.xlsx
          body: |
            안녕하세요, 부장님. 안드로이드 개발팀 강효재입니다.
            
            ${{ github.event.inputs.custom_message }}
            
            금일 배포 건에 대해 시스템이 직접 수행한 15개 테스트 결과 리포트를 첨부합니다. [cite: 169, 2026-04-28]
            꼼꼼하게 확인 부탁드립니다. [cite: 2026-03-13]