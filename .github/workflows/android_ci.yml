name: Android Production CI/CD (Firebase & Release)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      version_tag:
        description: '배포할 버전 (예: v1.0.6)'
        required: true
        default: 'v1.0.6'
      release_note:
        description: '부장님께 보고할 이번 배포의 주요 목적'
        required: true
        default: '시스템 안정화 및 마이너 버그 수정'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Quality Check (Lint & Unit Test)
        run: ./gradlew lintDebug test

      # 엑셀(CSV) 보고서 생성 로직
      - name: Generate Quality CSV Report
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import csv
          import os
          xml_path = 'app/build/reports/lint-results-debug.xml'
          csv_path = 'daily_quality_report.csv'
          if not os.path.exists(xml_path):
              print('No lint XML found.')
              exit(0)
          tree = ET.parse(xml_path)
          root = tree.getroot()
          with open(csv_path, 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.writer(f)
              writer.writerow(['심각도', '카테고리', '내용', '파일 경로', '라인'])
              for issue in root.findall('issue'):
                  location = issue.find('location')
                  writer.writerow([
                      issue.get('severity'),
                      issue.get('category'),
                      issue.get('message'),
                      location.get('file'),
                      location.get('line')
                  ])
          "

      # 서버 보관용 업로드
      - name: Upload Quality Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-quality-reports
          path: |
            app/build/reports/lint-results-debug.html
            daily_quality_report.csv

  deploy:
    needs: build_and_test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Get Latest Commits
        id: get_commits
        run: |
          TAGS=$(git tag --sort=-creatordate)
          PREVIOUS_TAG=$(echo "$TAGS" | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%an)" -n 3)
          else
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%an)")
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build Production Artifacts
        run: ./gradlew bundleRelease assembleRelease assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
          generate_release_notes: false

      # [최종 고도화] 메일에 엑셀 파일 직접 첨부
      - name: Send Release Notification Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[릴리즈 완료] ${{ github.event.repository.name }} ${{ github.event.inputs.version_tag }}"
          to: "ttr5656@uangel.com"
          from: GitHub Actions CI/CD
          attachments: daily_quality_report.csv # [핵심] 생성된 엑셀 파일을 메일에 첨부!
          body: |
            안녕하세요, 부장님. 안드로이드 개발팀 강효재입니다.
            
            금일 신규 버전(${{ github.event.inputs.version_tag }})의 빌드 및 배포가 성공적으로 완료되었습니다.
            이번 버전의 상세 품질 리포트(엑셀)를 본 메일에 첨부하오니 업무에 참고 부탁드립니다.
            
            ■ 이번 배포 목적:
            ${{ github.event.inputs.release_note }}
            
            ■ 상세 변경 내역:
            ${{ env.COMMITS }}
            
            ■ 다운로드 경로: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version_tag }}
            
            감사합니다.
            강효재 드림 (시스템 자동 발송)