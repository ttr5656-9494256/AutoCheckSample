name: Android Production CI (Firebase Test Lab)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 1. 유닛 테스트 실행 (가장 기본 로직 검증)
      - name: Run Unit Tests
        run: ./gradlew test

      # 2. 테스트용 APK 빌드 (앱 본체 + 테스트 코드)
      - name: Build APKs for Testing
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      # 3. Google Cloud 인증 (효재님이 등록한 GCP_SA_KEY 사용)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Firebase Test Lab 실행 (구글 실기기에서 Espresso 실행)
      # Firebase Test Lab 실행 (기기 모델명을 더 범용적인 것으로 변경)
      - name: Run Espresso Tests on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=Pixel5,version=30,locale=ko,orientation=portrait \
            --timeout 10m