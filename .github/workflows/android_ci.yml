name: Android Production CI/CD (Firebase & Release)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      version_tag:
        description: '배포할 버전 (예: v1.0.6)'
        required: true
        default: 'v1.0.6'
      release_note:
        description: '부장님께 보고할 이번 배포의 주요 목적'
        required: true
        default: '시스템 안정화 및 마이너 버그 수정'

jobs:
  # [1단계: 품질 검증]
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Quality Check (Lint & Unit Test)
        run: ./gradlew lintDebug test

  # [2단계: 실기기 검증 및 배포]
  deploy:
    needs: build_and_test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # [로그 추출 최적화] 이전 태그 없으면 최근 3개만 가져오기
      - name: Get Latest Commits
        id: get_commits
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # [꼼꼼 튜닝] 태그가 없으면 최근 3개만!
            COMMITS=$(git log --pretty=format:"- %s (%an)" -n 3)
          else
            # 태그가 있으면 그 이후의 모든 변경사항 추출
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%an)")
          fi
          
          # 환경 변수 저장 (멀티라인 대응)
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # -------------------------------------------------------------------------
      # [필요 시 해제] Firebase Test Lab 실기기 검증 로직
      # -------------------------------------------------------------------------
      # - name: Build APK for Firebase Testing
      #   run: ./gradlew assembleDebug assembleDebugAndroidTest
      # - name: Run Firebase Test Lab
      #   uses: asadmansoor/android-test-lab-action@v1.2.0
      #   with:
      #     arg_credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      #     arg_project: ${{ secrets.FIREBASE_PROJECT_ID }}
      #     arg_test_apk: app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
      #     arg_app_apk: app/build/outputs/apk/debug/app-debug.apk
      # -------------------------------------------------------------------------

      - name: Build Production Artifacts (AAB & APK)
        run: ./gradlew bundleRelease assembleRelease assembleDebug

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: false

      - name: Send Release Notification Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[릴리즈 완료] ${{ github.event.repository.name }} ${{ github.event.inputs.version_tag }}"
          to: "ttr5656@uangel.com"
          from: GitHub Actions CI/CD
          body: |
            안녕하세요, 부장님. 안드로이드 개발팀 강효재입니다.
            
            금일 신규 버전(${{ github.event.inputs.version_tag }})의 빌드 및 배포가 성공적으로 완료되었습니다.
            아래 경로에서 테스트용 APK 및 정식 배포 파일을 확인하실 수 있습니다.
            
            ■ 이번 배포의 주요 목적:
            ${{ github.event.inputs.release_note }}
            
            ■ 상세 변경 내역:
            ${{ env.COMMITS }}
            
            ■ 다운로드 경로: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version_tag }}
            
            감사합니다.
            강효재 드림 (시스템 자동 발송)