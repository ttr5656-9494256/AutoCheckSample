name: Android Production CI/CD (Firebase & Release) # 워크플로우 공식 명칭

on: # 자동 실행 트리거 설정
  push:
    branches: [ "main" ] # main 브랜치 push 시 실행
    tags: [ "v*" ] # v로 시작하는 태그 push 시 배포 실행
  pull_request:
    branches: [ "main" ] # PR 생성 시 품질 검증 실행
  schedule:
    - cron: '0 23 * * *' # 매일 아침 8시(KST) 자동 실행 (부장님 보고용)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  # [1단계: 품질 검증 및 보고서 생성]
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 0단계: 린트(Lint) 정적 분석 및 엑셀 보고서 생성
      - name: Run Lint Check
        run: ./gradlew lintDebug

      - name: Generate Excel(CSV) Report
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import csv
          import os

          xml_path = 'app/build/reports/lint-results-debug.xml'
          csv_path = 'daily_quality_report.csv'

          if not os.path.exists(xml_path):
              print('No lint XML found.')
              exit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()

          with open(csv_path, 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.writer(f)
              writer.writerow(['심각도', '카테고리', '내용', '파일 경로', '라인'])
          
              for issue in root.findall('issue'):
                  location = issue.find('location')
                  writer.writerow([
                      issue.get('severity'),
                      issue.get('category'),
                      issue.get('message'),
                      location.get('file'),
                      location.get('line')
                  ])
          print('Report generated successfully.')
          "

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-quality-reports
          path: |
            app/build/reports/lint-results-debug.html
            daily_quality_report.csv

      # 1단계: 유닛 테스트 및 빌드 검증
      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build APKs for Testing
        run: ./gradlew assembleDebug assembleDebugAndroidTest

  # [2단계: 태그 기반 배포 및 메일 알림 시스템]
  deploy:
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 릴리즈용 AAB와 테스트용 APK(Release, Debug)를 모두 빌드
      - name: Build All Variants (AAB & APK)
        run: ./gradlew bundleRelease assembleRelease assembleDebug

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true

      # [내일의 핵심] 부장님께 다운로드 경로 메일 발송
      - name: Send Release Notification Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          # github.event.repository.name을 쓰면 'AutoCheckSample'이 자동으로 들어갑니다.
          subject: "[자동배포 완료] ${{ github.event.repository.name }} ${{ github.ref_name }} 버전 릴리즈 알림"
          to: "ttr5656@uangel.com" # 받는 사람 메일 주소
          from: GitHub Actions CI/CD
          body: |
            안녕하세요, 부장님. 안드로이드 개발팀 강효재입니다.
            
            금일 신규 버전(${{ github.ref_name }})의 품질 검증 및 빌드가 성공적으로 완료되었습니다.
            아래 경로에서 테스트용 APK 및 정식 배포 파일을 다운로드하실 수 있습니다.
            
            ■ 다운로드 경로: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            
            ※ 이번 버전에는 빌드 자동화 및 결과물 식별성 개선을 위해 
               Gradle 기반의 파일명 자동화 로직이 적용되었습니다. 
               (파일명 예시: autoCheckSample_v${{ github.ref_name }}_release.apk)
            
            특이 사항 발생 시 즉시 보고드리겠습니다.
            감사합니다.
            
            강효재 드림 (시스템 자동 발송)