name: Android Production CI/CD (Firebase & Release)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: '1. 배포 버전 (미입력 시 최신 Git 태그 자동 사용)'
        required: false
        default: ''
      release_title:
        description: '2. 배포 목적 (메일 제목 및 주요 요약)'
        required: true
        default: '시스템 안정화 및 품질 보고'
      release_details:
        description: '3. 상세 내용 (선택 사항)'
        required: false
        default: ''

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 모든 태그 정보를 가져오기 위해 필수 설정

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # [중요] 버전 결정 로직: 입력값이 없으면 최신 태그를 VERSION 변수에 할당
      - name: Determine Version
        id: get_version
        run: |
          if [ -z "${{ github.event.inputs.version_tag }}" ]; then
            # 가장 최근 태그를 가져오고, 없으면 v1.0.0으로 기본값 설정
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            echo "VERSION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          fi

      - name: Run Quality Check
        run: ./gradlew lintDebug testDebugUnitTest

      - name: Generate Quality Excel Report
        if: always()
        run: |
          pip install pandas xlsxwriter
          python generate_report.py

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-check-reports
          path: AutoCheck_Quality_Report.xlsx

  deploy:
    needs: build_and_test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Excel Report
        uses: actions/download-artifact@v4
        with:
          name: auto-check-reports

      - name: Build and Release
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }} # 결정된 버전 사용
          files: app/build/outputs/apk/release/*.apk

      - name: Send Notification Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          # 메일 제목에 결정된 버전(${{ env.VERSION }}) 반영
          subject: "[검증통과] ${{ github.event.inputs.release_title }} (${{ env.VERSION }})"
          to: "ttr5656@uangel.com"
          from: GitHub Actions CI/CD
          attachments: AutoCheck_Quality_Report.xlsx
          body: |
            안녕하세요, 안드로이드 개발팀 강효재입니다.
            
            금일 수행된 앱 배포 및 품질 검증 결과를 공유드립니다.
            
            ■ 배포 버전: ${{ env.VERSION }}
            ■ 배포 목적: ${{ github.event.inputs.release_title }}
            ■ 상세 내역: ${{ github.event.inputs.release_details || '특이 사항 없음' }}
            
            시스템이 직접 수행한 15개 테스트 시나리오 결과 리포트를 첨부합니다. [cite: 169, 2026-04-28]
            상세 내역은 첨부 파일을 확인해 주시기 바랍니다. [cite: 2026-03-13]