name: Android Production CI/CD (Firebase & Release) # 워크플로우의 공식 명칭

on: # 자동 실행을 위한 트리거 조건 설정
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 반영될 때 실행
    tags: [ "v*" ] # v로 시작하는 태그가 푸시될 때 배포 트리거 작동 [cite: 2026-04-24]
  pull_request:
    branches: [ "main" ] # 메인 브랜치로 합치기 전 품질 검증용 실행
  schedule:
    - cron: '0 23 * * *' # 매일 아침 8시(KST) 자동 실행 (부장님 일일 보고용) [cite: 2026-03-13]
  workflow_dispatch: # 관리자가 수동으로 즉시 실행 버튼 생성 [cite: 2026-01-12]

jobs:
  # [1단계: 품질 검증 및 보고서 생성 작업]
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 빌드 속도 최적화 [cite: 2026-01-12]

      - name: Grant Execute Permission
        run: chmod +x gradlew # 그래들 실행 권한 부여

      # ---------------------------------------------------------
      # 0단계: 린트(Lint) 정적 분석 - 코드 품질 및 보안 점검
      # ---------------------------------------------------------
      - name: Run Lint Check
        run: ./gradlew lintDebug # 코드 전수 조사 수행 [cite: 2026-03-13]

      - name: Generate Excel(CSV) Report
        if: always() # 실패해도 보고서는 무조건 생성 [cite: 2026-04-24]
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import csv
          import os

          xml_path = 'app/build/reports/lint-results-debug.xml'
          csv_path = 'daily_quality_report.csv'

          if not os.path.exists(xml_path):
              print('No lint XML found.')
              exit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()

          with open(csv_path, 'w', newline='', encoding='utf-8-sig') as f:
              writer = csv.writer(f)
              writer.writerow(['심각도', '카테고리', '내용', '파일 경로', '라인'])
          
              for issue in root.findall('issue'):
                  location = issue.find('location')
                  writer.writerow([
                      issue.get('severity'),
                      issue.get('category'),
                      issue.get('message'),
                      location.get('file'),
                      location.get('line')
                  ])
          print('Report generated successfully.')
          "

      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-quality-reports
          path: |
            app/build/reports/lint-results-debug.html
            daily_quality_report.csv

      # ---------------------------------------------------------
      # 1단계: 유닛 테스트 및 빌드 - 비즈니스 로직 검증
      # ---------------------------------------------------------
      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build APKs for Testing
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      # ---------------------------------------------------------
      # [비용 최적화를 위한 임시 비활성화] Firebase Test Lab
      # ---------------------------------------------------------
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}

      # - name: Set up Cloud SDK
      #   uses: google-github-actions/setup-gcloud@v2

      # - name: Run Espresso Tests on Firebase Test Lab
      #   run: |
      #     gcloud firebase test android run \
      #       --type instrumentation \
      #       --app app/build/outputs/apk/debug/app-debug.apk \
      #       --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
      #       --device model=oriole,version=31,locale=ko,orientation=portrait \
      #       --timeout 10m

  # ---------------------------------------------------------
  # [2단계: 태그 기반 배포 시스템] - v태그 푸시 시 배포 자동화
  # ---------------------------------------------------------
  deploy:
    needs: build_and_test # 품질 검증이 통과되어야 실행
    if: startsWith(github.ref, 'refs/tags/v') # v로 시작하는 태그일 때만 작동
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 배포를 위한 코드 체크아웃

      # [해결] 새로운 환경(Job)이므로 gradlew 실행 권한을 다시 부여합니다.
      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease # 배포용 AAB 파일 생성 [cite: 2026-03-13]

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # 자동 릴리즈 및 파일 업로드
        with:
          files: app/build/outputs/bundle/release/*.aab
          generate_release_notes: true # 업데이트 내역 자동 생성 [cite: 2026-04-24]