name: Android CI/CD Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # [전략적 수정] 인프라 이슈를 회피하기 위해 JUnit 중심 검증으로 전환
      - name: Run Unit Tests (JUnit)
        run: ./gradlew test

      - name: Build Debug APK
        run: ./gradlew assembleDebug