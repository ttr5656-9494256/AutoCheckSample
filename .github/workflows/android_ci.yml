name: Android Production CI/CD (Firebase & Release) # 워크플로우의 공식 명칭 (검증부터 배포까지 통합)

on: # 자동 실행을 위한 트리거 조건 설정
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 반영될 때 실행
    tags: [ "v*" ] # v1.0.0과 같이 v로 시작하는 태그가 푸시될 때 배포 트리거 작동 [cite: 2026-04-24]
  pull_request:
    branches: [ "main" ] # 메인 브랜치로 합치기 전 품질 검증용 실행
  schedule:
    - cron: '0 23 * * *' # 매일 아침 8시(KST) 자동 실행 (부장님 일일 보고용) [cite: 2026-03-13]
  workflow_dispatch: # 관리자가 수동으로 즉시 실행하고 싶을 때 사용하는 버튼 [cite: 2026-01-12]

jobs:
  # [1단계: 품질 검증 및 보고서 생성 작업]
  build_and_test:
    runs-on: ubuntu-latest # 최신 리눅스 환경에서 가상 서버 할당
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 프로젝트 소스코드를 가상 서버로 복사

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # 안드로이드 빌드 표준인 자바 17 환경 구성
        with:
          java-version: '17' # 프로젝트에서 사용하는 자바 버전 명시
          distribution: 'temurin' # 안정성이 검증된 오픈JDK 배포판 사용
          cache: gradle # 그래들 의존성 캐싱을 통해 빌드 속도 최적화 [cite: 2026-01-12]

      - name: Grant Execute Permission
        run: chmod +x gradlew # 빌드 도구 실행을 위한 권한 부여

      # ---------------------------------------------------------
      # 0단계: 린트(Lint) 정적 분석 - 코드 맞춤법 및 보안 점검
      # ---------------------------------------------------------
      - name: Run Lint Check
        run: ./gradlew lintDebug # 코드의 잠재적 버그, 보안 취약점을 실행 없이 전수 조사 [cite: 2026-03-13]

      - name: Generate Excel(CSV) Report
        if: always() # 린트 에러가 발생해도 원인 파악을 위해 엑셀 보고서는 무조건 생성 [cite: 2026-01-12]
        run: | # 파이썬 스크립트를 사용하여 기술 데이터를 비즈니스용 엑셀 형식으로 가공 [cite: 2026-04-24]
          python -c "
          import xml.etree.ElementTree as ET
          import csv
          import os

          xml_path = 'app/build/reports/lint-results-debug.xml' # 린트 검사 결과 원본 파일 경로
          csv_path = 'daily_quality_report.csv' # 출력될 엑셀(CSV) 파일 이름

          if not os.path.exists(xml_path): # 파일 누락 시 오류 방지를 위한 예외 처리
              print('No lint XML found.')
              exit(0)

          tree = ET.parse(xml_path) # XML 데이터 파싱 시작
          root = tree.getroot()

          with open(csv_path, 'w', newline='', encoding='utf-8-sig') as f: # 엑셀 한글 깨짐 방지 인코딩 적용 [cite: 2026-01-12]
              writer = csv.writer(f)
              writer.writerow(['심각도', '카테고리', '내용', '파일 경로', '라인']) # 엑셀 상단 헤더 작성
          
              for issue in root.findall('issue'): # 발견된 모든 품질 이슈를 순회하며 행 추가
                  location = issue.find('location')
                  writer.writerow([
                      issue.get('severity'), # 오류의 심각도 등급
                      issue.get('category'), # 오류의 종류(성능, 보안 등)
                      issue.get('message'), # 구체적인 수정 권고 사항
                      location.get('file'), # 문제가 발생한 소스 파일 경로
                      location.get('line') # 정확한 코드 줄 위치
                  ])
          print('Report generated successfully.')
          "

      - name: Upload Quality Reports
        if: always() # 결과와 관계없이 보고서 파일은 항상 저장 (아카이빙) [cite: 2026-03-13]
        uses: actions/upload-artifact@v4 # 생성된 보고서를 GitHub 웹 화면에서 다운로드 가능하게 업로드
        with:
          name: daily-quality-reports # 저장될 폴더 이름 지정
          path: | # 보관할 리포트 리스트
            app/build/reports/lint-results-debug.html # 시각화된 웹 리포트
            daily_quality_report.csv # 부장님 보고용 엑셀 시트

      # ---------------------------------------------------------
      # 1단계: 유닛 테스트 및 빌드 - 로직 검증 및 APK 생성
      # ---------------------------------------------------------
      - name: Run Unit Tests
        run: ./gradlew test # 핵심 비즈니스 로직에 대한 단위 테스트 수행 [cite: 2026-03-13]

      - name: Build APKs for Testing
        run: ./gradlew assembleDebug assembleDebugAndroidTest # 실기기 테스트용 앱 본체와 테스트 APK 동시 빌드

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2 # 구글 클라우드 보안 인증 처리
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # 효재님이 등록한 보안 비밀 키 사용 [cite: 2026-03-13]

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2 # 원격 제어를 위한 구글 클라우드 도구 세팅

      - name: Run Espresso Tests on Firebase Test Lab
        run: | # 실제 구글 데이터센터에 있는 안드로이드 기기에서 앱 실행 및 동작 검증 [cite: 100, 2026-03-13]
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=oriole,version=31,locale=ko,orientation=portrait \
            --timeout 10m # 최대 10분 동안 실기기 테스트 및 결과 수집

  # ---------------------------------------------------------
  # [2단계: 태그 기반 배포 시스템] - v태그 푸시 시 배포 자동화
  # ---------------------------------------------------------
  deploy:
    needs: build_and_test # 품질 검증(1단계)이 모두 통과되어야만 배포 실행 [cite: 2026-01-12]
    if: startsWith(github.ref, 'refs/tags/v') # v로 시작하는 버전 태그가 있을 때만 작동 [cite: 2026-04-24]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 배포할 소스코드 확보

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # 배포용 빌드 환경 구축
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release Bundle (AAB)
        run: ./gradlew bundleRelease # 구글 플레이 스토어 표준 배포 파일(AAB) 생성 [cite: 2026-03-13]

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 # GitHub Release 페이지에 배포 파일 자동 업로드 및 기록 생성
        with:
          files: app/build/outputs/bundle/release/*.aab # 생성된 배포 파일을 꼼꼼하게 첨부
          generate_release_notes: true # 이전 버전 대비 변경된 커밋 내역 자동 요약 [cite: 2026-04-24]